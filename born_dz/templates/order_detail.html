<tr>
    <td class="text-center">Bon de commande {{ order.id }}</td>
    <td class="text-center">{{ order.status }}</td>
    <td class="text-center">{{ order.date|date:"d/m/Y H:i" }}</td>
    <td>
        <ul class="mb-0 small">
            {% for item in items %}
                <li>{{ item.name }} x {{ item.quantity }} — {{ item.price }} DA</li>
            {% empty %}
                <li class="text-muted">Aucun article</li>
            {% endfor %}
        </ul>
    </td>
    <td class="fw-bold text-end text-success">{{ order.total_price|floatformat:2 }} DA</td>
</tr>
