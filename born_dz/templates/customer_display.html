<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi de commandes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: #1a1a1a;
      border-bottom: 3px solid #2a2a2a;
      flex-shrink: 0;
    }

    .header-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
    }

    .header-logo span {
      color: var(--primary, #f97316);
    }

    .header-clock {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
      opacity: 0.9;
    }

    .ws-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
      margin-right: 8px;
      transition: background 0.4s;
    }
    .ws-dot.connected { background: #22c55e; }

    /* ── COLONNES ────────────────────────────── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .column {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .column:first-child {
      border-right: 3px solid #2a2a2a;
    }

    .col-header {
      padding: 22px 30px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      flex-shrink: 0;
    }

    .col-header.preparing {
      background: #1c2333;
      color: #60a5fa;
      border-bottom: 3px solid #2563eb;
    }

    .col-header.ready {
      background: #1a2e1a;
      color: #4ade80;
      border-bottom: 3px solid #16a34a;
    }

    .col-header .count-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 2px 12px;
      font-size: 16px;
      margin-left: 10px;
      font-weight: 600;
    }

    /* ── GRILLE DES NUMÉROS ──────────────────── */
    .orders-grid {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 16px;
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .orders-grid::-webkit-scrollbar { width: 6px; }
    .orders-grid::-webkit-scrollbar-track { background: transparent; }
    .orders-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .order-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      width: calc(25% - 12px);
      aspect-ratio: 1;
      min-width: 110px;
      min-height: 110px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
      transition: transform 0.2s, opacity 0.3s;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .order-chip.preparing {
      background: #1e3a5f;
      border: 2px solid #2563eb;
      color: #93c5fd;
    }

    .order-chip.ready {
      background: #14532d;
      border: 2px solid #16a34a;
      color: #86efac;
    }

    .order-chip .takeaway-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0.7;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── ÉTAT VIDE ───────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      background: #1a1a1a;
      border-top: 2px solid #2a2a2a;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: #555;
      flex-shrink: 0;
    }

    /* ── PULSATION "PRÊT" ────────────────────── */
    .order-chip.ready {
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1),
                 pulse 2s ease-in-out infinite 0.35s;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(22, 163, 74, 0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">Click<span>Go</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="ws-dot" id="wsDot"></span>
      <span id="wsStatus" style="font-size:13px;color:#666;">Connexion…</span>
    </div>
    <div class="header-clock" id="clock">--:--:--</div>
  </header>

  <div class="columns">
    <!-- En préparation -->
    <div class="column">
      <div class="col-header preparing">
        🍳 En préparation
        <span class="count-badge" id="countPreparing">0</span>
      </div>
      <div class="orders-grid" id="gridPreparing">
        <div class="empty-state" id="emptyPreparing">Aucune commande</div>
      </div>
    </div>

    <!-- Prêtes -->
    <div class="column">
      <div class="col-header ready">
        ✅ Prêt à récupérer
        <span class="count-badge" id="countReady">0</span>
      </div>
      <div class="orders-grid" id="gridReady">
        <div class="empty-state" id="emptyReady">Aucune commande</div>
      </div>
    </div>
  </div>

  <footer>
    Présentez votre numéro de commande au comptoir — Merci de votre visite !
  </footer>

  <script>
    const RESTAURANT_ID = {{ restaurant_id }};
    const API_URL = `/order/api/kds/orders/${RESTAURANT_ID}/`;
    const WS_URL  = `ws://${location.host}/ws/kds/`;

    // ── Horloge ──────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── État local ────────────────────────────────────────────
    let orders = [];   // liste complète des commandes actives

    const PREPARING_STATUSES = ['pending', 'confirmed', 'in_progress'];
    const READY_STATUSES      = ['ready'];

    // ── Rendu ─────────────────────────────────────────────────
    function render() {
      const preparing = orders.filter(o => PREPARING_STATUSES.includes(o.order_status));
      const ready     = orders.filter(o => READY_STATUSES.includes(o.order_status));

      document.getElementById('countPreparing').textContent = preparing.length;
      document.getElementById('countReady').textContent     = ready.length;

      renderGrid('gridPreparing', 'emptyPreparing', preparing, 'preparing');
      renderGrid('gridReady',     'emptyReady',     ready,     'ready');
    }

    function renderGrid(gridId, emptyId, list, cls) {
      const grid  = document.getElementById(gridId);
      const empty = document.getElementById(emptyId);

      // Supprimer les chips existantes (pas l'empty-state)
      Array.from(grid.querySelectorAll('.order-chip')).forEach(el => el.remove());

      if (list.length === 0) {
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';

      list.forEach(o => {
        const chip = document.createElement('div');
        chip.className = `order-chip ${cls}`;
        chip.dataset.orderId = o.order_id;
        chip.innerHTML = `
          <span>#${o.order_id}</span>
          ${o.take_away ? '<span class="takeaway-tag">À emporter</span>' : ''}
        `;
        grid.appendChild(chip);
      });
    }

    // ── Fetch initial ─────────────────────────────────────────
    async function fetchOrders() {
      try {
        const res  = await fetch(API_URL);
        const data = await res.json();
        orders = data.orders || [];
        render();
      } catch (e) {
        console.error('[Display] Erreur fetch:', e);
      }
    }

    // ── WebSocket ─────────────────────────────────────────────
    let ws = null;
    let reconnectTimer = null;

    function setWsStatus(connected) {
      document.getElementById('wsDot').className      = 'ws-dot' + (connected ? ' connected' : '');
      document.getElementById('wsStatus').textContent = connected ? 'En direct' : 'Reconnexion…';
    }

    function connectWS() {
      if (ws) { try { ws.close(); } catch(_) {} }
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setWsStatus(true);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onmessage = (event) => {
        try {
          const msg  = JSON.parse(event.data);
          const data = msg.data || {};

          if (msg.type === 'kds_message') {
            if (data.type === 'new_order') {
              // Nouvelle commande → refetch complet
              fetchOrders();
            } else if (data.type === 'order_updated') {
              const { order_id, status } = data;
              const INACTIVE = ['delivered', 'cancelled'];

              if (INACTIVE.includes(status)) {
                // Retirer la commande de l'affichage
                orders = orders.filter(o => o.order_id !== order_id);
              } else {
                // Mettre à jour le statut en local
                const existing = orders.find(o => o.order_id === order_id);
                if (existing) {
                  existing.order_status = status;
                } else {
                  // Commande inconnue → refetch
                  fetchOrders();
                  return;
                }
              }
              render();
            }
          }
        } catch (e) {
          console.error('[Display] Erreur message WS:', e);
        }
      };

      ws.onclose = () => {
        setWsStatus(false);
        reconnectTimer = setTimeout(connectWS, 4000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Init ──────────────────────────────────────────────────
    fetchOrders();
    connectWS();

    // Refresh complet toutes les 30s (filet de sécurité)
    setInterval(fetchOrders, 30000);
  </script>
</body>
</html>
