<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chargement POS-Desktop</title>
    <style>
        :root {
            --primary: #6366f1; /* Indigo moderne */
            --bg-dark: #0f172a; /* Bleu nuit profond */
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag; /* Permet de déplacer la fenêtre splash */
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 280px;
        }

        /* Logo stylisé avec icône de caisse enregistreuse simplifiée */
        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        .logo-icon {
            font-size: 40px;
            font-weight: bold;
            color: white;
            user-select: none;
        }

        h2 {
            margin: 0;
            font-size: 1.5em;
            letter-spacing: 1px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            margin-top: 20px;
        }

        .status-text {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* Barre de progression moderne */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            width: 40%;
            background: var(--primary);
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        /* Animations */
        @keyframes loading {
            0% { left: -40%; width: 30%; }
            50% { width: 60%; }
            100% { left: 110%; width: 30%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .pulse {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 22px;
            background: var(--primary);
            opacity: 0.3;
            animation: pulse-ring 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
            z-index: -1;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.3; }
            50% { opacity: 0.1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="pulse"></div>
            <div class="logo-circle">
                <span class="logo-icon">P</span>
            </div>
        </div>
        <h2>POS-SYSTEM</h2>
        
        <div class="status-container">
            <p class="status-text">Initialisation des modules...</p>
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // Optionnel : Dynamiser les messages de chargement
        const messages = [
            "Lancement de Django...",
            "Vérification du port 8000...",
            "Démarrage du serveur statique...",
            "Finalisation..."
        ];
        let i = 0;
        const textElement = document.querySelector('.status-text');
        
        setInterval(() => {
            if (i < messages.length) {
                textElement.innerText = messages[i];
                i++;
            }
        }, 3000);
    </script>
</body>
</html>
