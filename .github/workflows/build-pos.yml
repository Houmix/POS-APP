name: Build ClickGo POS

on:
  push:
    tags:
      - 'v*'        # déclenché sur : git tag v1.2.0 && git push --tags
  workflow_dispatch:  # ou manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Récupérer le code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 2b. Synchroniser la version du package.json avec le tag ───────────
      - name: Set version from tag
        working-directory: my-desktop-app
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          # Supprimer le préfixe 'v' si présent
          VERSION="${VERSION#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          # Mettre à jour package.json
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Version set to: $VERSION"

      # ── 3. Python + venv + PyInstaller ────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies & PyInstaller
        working-directory: born_dz
        run: |
          python -m venv venv
          venv\Scripts\pip install --upgrade pip
          venv\Scripts\pip install -r requirements.txt
          venv\Scripts\pip install pyinstaller
        shell: cmd

      # ── 4. Installer les dépendances Node ─────────────────────────────────
      - name: Install POS frontend (Expo) dependencies
        working-directory: POS
        run: npm install

      - name: Install Electron app dependencies
        working-directory: my-desktop-app
        run: npm install

      # ── 5. Build Expo frontend (web-build) ────────────────────────────────
      - name: Install Expo web dependencies
        working-directory: POS
        run: npm install --legacy-peer-deps react-dom react-native-web react-native-svg

      - name: Build Expo web frontend
        working-directory: POS
        run: npx expo export --platform web --output-dir web-build
        env:
          EXPO_NO_TELEMETRY: '1'

      # ── 6. Créer une base de données SQLite vierge ───────────────────────
      - name: Create fresh empty database
        working-directory: born_dz
        run: |
          if exist db.sqlite3 del db.sqlite3
          venv\Scripts\python manage.py migrate --run-syncdb
        shell: cmd

      # ── 7. Bundle Django avec PyInstaller ─────────────────────────────────
      - name: Bundle Python backend (PyInstaller)
        working-directory: my-desktop-app
        run: node pyinstaller_bundle.js
        shell: cmd

      # ── 7. Build installeur Electron ──────────────────────────────────────
      - name: Build Electron installer (.exe)
        working-directory: my-desktop-app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Créer la Release GitHub + uploader le .exe + latest.yml ────────
      - name: Create GitHub Release & upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ClickGo POS v${{ env.APP_VERSION }}
          files: |
            my-desktop-app/dist/ClickGo-POS-Setup.exe
            my-desktop-app/dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
